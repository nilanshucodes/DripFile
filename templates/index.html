<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DripFile</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body,
    .upload-box,
    button,
    .main-btn,
    .theme-btn,
    a {
      transition: background 0.5s ease, background-color 0.5s ease, color 0.5s ease, box-shadow 0.5s ease;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.theme-ocean {
      background: linear-gradient(135deg, #1e90ff, #00bfff);
      color: #fff;
    }
    body.theme-ocean .upload-box {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 6px 25px rgba(0,0,0,0.2);
    }
    body.theme-ocean button.main-btn {
      background-color: #fff;
      color: #1e90ff;
    }
    body.theme-ocean button.main-btn:hover {
      background-color: #e0e0e0;
    }
    body.theme-ocean .result-box a { color: #fff; }
    body.theme-ocean .error-msg { color: yellow; }
    body.theme-ocean .theme-btn {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    body.theme-sunset {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #3a1c00;
    }
    body.theme-sunset .upload-box {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
    }
    body.theme-sunset button.main-btn {
      background-color: #fff;
      color: #f7971e;
    }
    body.theme-sunset button.main-btn:hover {
      background-color: #f0e6d0;
    }
    body.theme-sunset .result-box a { color: #3a1c00; }
    body.theme-sunset .error-msg { color: #8b0000; }
    body.theme-sunset .theme-btn {
      background: rgba(255,255,255,0.35);
      color: #3a1c00;
    }

    body.theme-forest {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
    }
    body.theme-forest .upload-box {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 6px 25px rgba(0,0,0,0.2);
    }
    body.theme-forest button.main-btn {
      background-color: #fff;
      color: #11998e;
    }
    body.theme-forest button.main-btn:hover {
      background-color: #d0f5e0;
    }
    body.theme-forest .result-box a { color: #fff; }
    body.theme-forest .error-msg { color: #ffe066; }
    body.theme-forest .theme-btn {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    body.theme-midnight {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0ff;
    }
    body.theme-midnight .upload-box {
      background: rgba(255,255,255,0.08);
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    }
    body.theme-midnight button.main-btn {
      background-color: #6c63ff;
      color: #fff;
    }
    body.theme-midnight button.main-btn:hover {
      background-color: #5a52d5;
    }
    body.theme-midnight .result-box a { color: #b8b5ff; }
    body.theme-midnight .error-msg { color: #ff6b6b; }
    body.theme-midnight .theme-btn {
      background: rgba(108,99,255,0.3);
      color: #e0e0ff;
    }

    body.theme-rose {
      background: linear-gradient(135deg, #ee9ca7, #ffdde1);
      color: #4a1942;
    }
    body.theme-rose .upload-box {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 6px 25px rgba(0,0,0,0.1);
    }
    body.theme-rose button.main-btn {
      background-color: #fff;
      color: #d63384;
    }
    body.theme-rose button.main-btn:hover {
      background-color: #fce4ec;
    }
    body.theme-rose .result-box a { color: #4a1942; }
    body.theme-rose .error-msg { color: #b71c1c; }
    body.theme-rose .theme-btn {
      background: rgba(255,255,255,0.4);
      color: #4a1942;
    }

    body.theme-charcoal {
      background: linear-gradient(135deg, #2c2c2c, #1a1a2e);
      color: #e0e0e0;
    }
    body.theme-charcoal .upload-box {
      background: rgba(255,255,255,0.07);
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    }
    body.theme-charcoal button.main-btn {
      background-color: #00d2ff;
      color: #1a1a2e;
    }
    body.theme-charcoal button.main-btn:hover {
      background-color: #00b8e6;
    }
    body.theme-charcoal .result-box a { color: #00d2ff; }
    body.theme-charcoal .error-msg { color: #ff5252; }
    body.theme-charcoal .theme-btn {
      background: rgba(0,210,255,0.2);
      color: #e0e0e0;
    }

    header {
      text-align: center;
      padding: 60px 20px 20px;
      position: relative;
    }
    header h1 {
      font-size: 3rem;
      margin: 0;
      font-weight: bold;
    }
    header p {
      font-size: 1.2rem;
      margin-top: 10px;
      opacity: 0.9;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .upload-box {
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .upload-box h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: block;
      margin: 20px auto;
      font-size: 1rem;
      color: #000;
      background: #fff;
      padding: 5px;
      border-radius: 6px;
      cursor: pointer;
    }
    button.main-btn {
      padding: 12px 25px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
    }
    .result-box a {
      font-weight: bold;
      word-wrap: break-word;
    }
    .error-msg {
      margin-top: 15px;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      border: none;
      border-radius: 50px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      backdrop-filter: blur(8px);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, background 0.3s;
    }
    .theme-btn:hover {
      transform: scale(1.08);
    }
    .theme-btn .icon {
      font-size: 1.2rem;
      transition: transform 0.4s;
    }
    .theme-btn:active .icon {
      transform: rotate(180deg);
    }
  </style>
</head>
<body class="theme-ocean">
  <button class="theme-btn" type="button" onclick="cycleTheme()" title="Switch theme" aria-label="Cycle color theme">
    <span class="icon">🎨</span>
    <span id="theme-label" aria-live="polite">Ocean</span>
  </button>

  <header>
    <h1>DripFile</h1>
    <p>Upload and share files instantly. Links expire in 15 minutes.</p>
  </header>

  <main>
    <div class="upload-box">
      <h2>Upload Your File</h2>
      <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit" class="main-btn">Upload & Get Link</button>
      </form>
      <p style="margin-top: 15px; font-size: 0.95rem;">Max file size: 25 MB</p>

      {% if error %}
        <p class="error-msg">{{ error }}</p>
      {% endif %}

      {% if link %}
        <div class="result-box">
          <p><strong>Upload successful!</strong></p>
          <p>This link will expire in 15 minutes:</p>
          <p><a href="{{ link }}">{{ link }}</a></p>
        </div>
      {% endif %}
    </div>
  </main>

  <footer>
    <p>© 2025 DripFile</p>
  </footer>

  <script>
    const themes = [
      { class: 'theme-ocean',    label: 'Ocean' },
      { class: 'theme-sunset',   label: 'Sunset' },
      { class: 'theme-forest',   label: 'Forest' },
      { class: 'theme-midnight', label: 'Midnight' },
      { class: 'theme-rose',     label: 'Rosé' },
      { class: 'theme-charcoal', label: 'Charcoal' }
    ];

    let currentIndex = parseInt(localStorage.getItem('dripfile-theme') || '0');

    function applyTheme(index) {
      document.body.className = themes[index].class;
      document.getElementById('theme-label').textContent = themes[index].label;
      localStorage.setItem('dripfile-theme', index);
    }

    function cycleTheme() {
      currentIndex = (currentIndex + 1) % themes.length;
      applyTheme(currentIndex);
    }
    applyTheme(currentIndex);
  </script>
</body>
</html>
